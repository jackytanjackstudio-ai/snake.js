<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Snake Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <div class="header">
            <h1>Snake Game Premium</h1>
            <button id="settingsBtn" class="settings-btn">⚙️</button>
        </div>

        <!-- Settings Menu -->
        <div id="settingsMenu" class="settings-menu" style="display:none;">
            <h2>Settings</h2>
            <div class="settings-content">
                <div class="setting-group">
                    <h3>🎨 Theme</h3>
                    <div class="theme-grid">
                        <button class="theme-btn" data-theme="classic">Classic</button>
                        <button class="theme-btn" data-theme="neon">Neon</button>
                        <button class="theme-btn" data-theme="retro">Retro</button>
                        <button class="theme-btn" data-theme="dark">Dark</button>
                        <button class="theme-btn" data-theme="ocean">Ocean</button>
                    </div>
                </div>
                <div class="setting-group">
                    <h3>🔊 Sound</h3>
                    <label class="toggle">
                        <input type="checkbox" id="soundToggle" checked>
                        <span class="toggle-slider"></span>
                        <span class="toggle-label">Sound Effects</span>
                    </label>
                </div>
            </div>
            <button id="closeSettings" class="close-settings-btn">Close</button>
        </div>

        <!-- Mode Selection Screen -->
        <div id="modeSelection" class="mode-selection">
            <h2>Select Game Mode</h2>
            <div class="mode-grid">
                <button class="mode-btn" data-mode="classic">
                    <span class="mode-icon">🎮</span>
                    <span class="mode-name">Classic</span>
                    <span class="mode-desc">Traditional endless gameplay</span>
                </button>
                <button class="mode-btn" data-mode="timeattack">
                    <span class="mode-icon">⏱️</span>
                    <span class="mode-name">Time Attack</span>
                    <span class="mode-desc">60 seconds to max score</span>
                </button>
                <button class="mode-btn" data-mode="survival">
                    <span class="mode-icon">❤️</span>
                    <span class="mode-name">Survival</span>
                    <span class="mode-desc">3 lives, increasing speed</span>
                </button>
                <button class="mode-btn" data-mode="zen">
                    <span class="mode-icon">🧘</span>
                    <span class="mode-name">Zen Mode</span>
                    <span class="mode-desc">No walls, pure flow</span>
                </button>
            </div>
        </div>

        <!-- Game Screen -->
        <div id="gameScreen" class="game-screen" style="display:none;">
            <div class="game-info">
                <div class="score-board">
                    <div>Score: <span id="score">0</span></div>
                    <div>High Score: <span id="highScore">0</span></div>
                </div>
                <div class="game-stats">
                    <span id="modeDisplay"></span>
                    <span id="timeDisplay" style="display:none;"></span>
                    <span id="livesDisplay" style="display:none;"></span>
                    <span id="comboDisplay" style="display:none;"></span>
                </div>
            </div>
            <canvas id="gameCanvas" width="400" height="400"></canvas>
            <div class="controls">
                <button id="startBtn">Start Game</button>
                <button id="backBtn">Back to Menu</button>
            </div>
        </div>
        <div class="mobile-controls">
            <div class="control-row">
                <button class="control-btn" id="upBtn">▲</button>
            </div>
            <div class="control-row">
                <button class="control-btn" id="leftBtn">◄</button>
                <button class="control-btn" id="downBtn">▼</button>
                <button class="control-btn" id="rightBtn">►</button>
            </div>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
