databases:
  - name: snake-game-db
    databaseName: snake_game
    plan: free
    region: oregon

services:
  - type: web
    name: snake-game-backend
    env: node
    plan: free
    region: oregon
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: snake-game-db
          property: connectionString
      - key: ADMIN_PASSWORD
        generateValue: true
    healthCheckPath: /api/health
